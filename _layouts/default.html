<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta name="author" content="{{ site.title }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link type="application/atom+xml" rel="alternate" href="{{ '/feed.xml' | relative_url }}" title="{{ site.title }}">
</head>
<body>
  <nav id="navbar">
    <div class="nav-container">
      <a href="{{ '/' | relative_url }}" class="nav-logo">MT</a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="{{ '/#about' | relative_url }}">About</a></li>
        <li><a href="{{ '/#skills' | relative_url }}">Skills</a></li>
        <li><a href="{{ '/#experience' | relative_url }}">Experience</a></li>
        <li><a href="{{ '/#projects' | relative_url }}">Projects</a></li>
        <li><a href="{{ '/blog' | relative_url }}">Blog</a></li>
        <li><a href="{{ '/#contact' | relative_url }}" class="nav-cta">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main>{{ content }}</main>

  <footer>
    <div class="container">
      <div class="footer-content">
        <p>© {{ 'now' | date: "%Y" }} Mangesh Tekale · Built with Jekyll &amp; GitHub Pages</p>
        <div class="footer-links">
          <a href="https://linkedin.com/in/mangeshtekale" target="_blank" rel="noopener noreferrer">LinkedIn</a>
          <a href="{{ '/blog' | relative_url }}">Blog</a>
          <a href="mailto:mangesh20@gmail.com">Email</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 20);
    });

    const toggle = document.getElementById('navToggle');
    const links = document.getElementById('navLinks');
    toggle.addEventListener('click', () => {
      links.classList.toggle('open');
      toggle.classList.toggle('open');
    });
    document.querySelectorAll('.nav-links a').forEach(a => {
      a.addEventListener('click', () => {
        links.classList.remove('open');
        toggle.classList.remove('open');
      });
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    document.querySelectorAll('.blog-list-item').forEach((item) => {
      const link = item.querySelector('h2 a');
      if (!link) return;

      item.setAttribute('role', 'link');
      item.setAttribute('tabindex', '0');
      item.style.cursor = 'pointer';

      item.addEventListener('click', (event) => {
        if (event.target.closest('a')) return;
        window.location.href = link.href;
      });

      item.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          window.location.href = link.href;
        }
      });
    });

    document.querySelectorAll('.post-body pre').forEach((pre) => {
      const code = pre.querySelector('code');
      if (!code) return;

      const figure = pre.closest('figure');
      let block = figure;

      if (!block) {
        block = document.createElement('div');
        pre.parentNode.insertBefore(block, pre);
        block.appendChild(pre);
      }
      if (block.classList.contains('code-block')) return;

      block.classList.add('code-block');
      pre.setAttribute('tabindex', '0');
      const languageClass = Array.from(code.classList).find((c) => c.startsWith('language-'));
      const language = (code.dataset.lang || (languageClass ? languageClass.replace('language-', '') : 'code')).toUpperCase();

      const toolbar = document.createElement('div');
      toolbar.className = 'code-toolbar';

      const lang = document.createElement('span');
      lang.className = 'code-lang';
      lang.textContent = language;
      toolbar.appendChild(lang);

      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'copy-code-button';
      button.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 7a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-8a2 2 0 0 1-2-2V7zm-6 4a2 2 0 0 1 2-2h1v2H5v8h8v1a2 2 0 0 0 .15.76A2 2 0 0 1 12 21H5a2 2 0 0 1-2-2v-8z"/></svg>';
      button.setAttribute('aria-label', 'Copy code snippet');
      button.setAttribute('title', 'Copy');
      toolbar.appendChild(button);

      block.insertBefore(toolbar, pre);

      button.addEventListener('click', async () => {
        const text = code.innerText;
        try {
          await navigator.clipboard.writeText(text);
          button.setAttribute('title', 'Copied');
          button.setAttribute('aria-label', 'Copied');
          button.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.3 6.7a1 1 0 0 1 0 1.4l-9 9a1 1 0 0 1-1.4 0l-4.2-4.2a1 1 0 0 1 1.4-1.4l3.5 3.5 8.3-8.3a1 1 0 0 1 1.4 0z"/></svg>';
          button.classList.add('copied');
          window.setTimeout(() => {
            button.classList.remove('copied');
            button.setAttribute('title', 'Copy');
            button.setAttribute('aria-label', 'Copy code snippet');
            button.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 7a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-8a2 2 0 0 1-2-2V7zm-6 4a2 2 0 0 1 2-2h1v2H5v8h8v1a2 2 0 0 0 .15.76A2 2 0 0 1 12 21H5a2 2 0 0 1-2-2v-8z"/></svg>';
          }, 1800);
        } catch (error) {
          button.setAttribute('title', 'Select and copy');
          pre.focus();
        }
      });
    });
  </script>
</body>
</html>
